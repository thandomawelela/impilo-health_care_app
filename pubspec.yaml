name: healthapp
description: "Impilo Track - Health & Patient Management App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # Firebase
  firebase_core: ^2.30.1
  firebase_auth: ^4.19.4
  cloud_firestore: ^4.17.2
  firebase_messaging: ^14.9.1
  
  # Database
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.1
  
  # Auth
  local_auth: ^2.1.8
  
  # Notifications
  flutter_local_notifications: ^5.0.0
  timezone: ^0.7.0
  
  # UI & Charts
  fl_chart: ^0.68.0
  provider: ^5.0.0
  lottie: ^3.1.0
  carousel_slider: ^5.1.2
  table_calendar: ^3.1.1
  
  # Network
  connectivity_plus: ^5.0.2
  http: ^1.2.1
  intl: ^0.19.0
  
  # New packages for advanced features
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.6
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.4
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/gifs/